# SmartClaw 多副本「完整状态一致」HA 编排（见 progress.md §13）
#
# 目标：在本机用 Docker 真实复现「多服务器水平扩容」下的三类状态一致：
#   ① 控制面（租户开通/停用/限额/路由）：共享 Redis（store=redis，连不上 fail-fast）。
#   ② 数据面 / 结构化记忆（messages/summaries/events/profile/embeddings）：
#      共享 PostgreSQL（store=postgres + pg_advisory_lock 会话级串行化）。
#   ③ 文件态（.key 加密钥 / agent.json / MEMORY.md / session / workspace）：
#      共享卷 fc_state 挂载到两副本同一路径 /root/.smartclaw（SMARTCLAW_HOME 指向它），
#      即「用一份」；写安全由 LB 会话亲和（ip_hash）保证（同一 Agent 不被两副本并发写）。
#
#  关键源码事实：
#   - Fernet 加密钥固定在 ~/.smartclaw/.key（agent/manager.py），按节点随机生成；
#     多副本必须共享它，否则副本 B 解不开副本 A 写的 agent.json 密文。
#   - 长期记忆 MEMORY.md 固定在 ~/.smartclaw/agents/{agent}/MEMORY.md（memory/longterm.py）。
#   - 将 SMARTCLAW_HOME 设为 /root/.smartclaw，可让 install_root 树与 home 树合一，
#     一个共享卷即覆盖全部文件态。
#
# 拓扑：1×redis + 1×postgres + 2×smartclaw 副本（app1:8001 / app2:8002，仅 HTTP）
#       + 1×nginx LB（8080，ip_hash 亲和）。
#
# 用法（PowerShell）：
#   $env:SMARTCLAW_ADMIN_TOKEN = "demo-admin-token-2026"
#   docker compose -f docker-compose.ha.yml up -d --build
#   python scripts/verify_state_consistency.py
#   docker compose -f docker-compose.ha.yml down -v

services:
  redis:
    image: redis:7-alpine
    container_name: fc-ha-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 2s

  postgres:
    image: postgres:16-alpine
    container_name: fc-ha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartclaw
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-smartclaw_pg_pwd}"
      POSTGRES_DB: smartclaw
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartclaw -d smartclaw"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  app1: &app
    build:
      context: .
      dockerfile: Dockerfile
    image: smartclaw:ha
    container_name: fc-ha-app1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # ① 控制面：硬性 Redis，连不上 fail-fast
      SMARTCLAW_GOVERNANCE_ENABLED: "true"
      SMARTCLAW_GOVERNANCE_STORE: "redis"
      SMARTCLAW_GOVERNANCE_REDIS_URL: "redis://redis:6379/0"
      # ② 数据面：共享 PostgreSQL（绝不静默回退 SQLite）
      SMARTCLAW_MEMORY_STORE: "postgres"
      SMARTCLAW_MEMORY_POSTGRES_DSN: "postgresql://smartclaw:${POSTGRES_PASSWORD:-smartclaw_pg_pwd}@postgres:5432/smartclaw"
      # ③ 文件态：SMARTCLAW_HOME 指向共享卷挂载点，使 install_root 树与 home 树合一
      SMARTCLAW_HOME: "/root/.smartclaw"
      # PID/run 是「节点本地运行期产物」，必须各副本独立（否则误判服务已在运行）
      SMARTCLAW_RUN_DIR: "/tmp/fc-run"
      # 两副本共享同一管理面凭证
      SMARTCLAW_ADMIN_TOKEN: "${SMARTCLAW_ADMIN_TOKEN:?请先设置 SMARTCLAW_ADMIN_TOKEN（多副本共享同一凭证）}"
      SMARTCLAW_REPLICA_ID: "app1"
    command: ["smartclaw", "start", "--no-feishu", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      # 共享文件态：.key / agent.json / MEMORY.md / session / workspace 全部「用一份」
      - fc_state:/root/.smartclaw
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/monitoring/health"]
      interval: 5s
      timeout: 4s
      retries: 12
      start_period: 15s

  app2:
    <<: *app
    container_name: fc-ha-app2
    environment:
      SMARTCLAW_GOVERNANCE_ENABLED: "true"
      SMARTCLAW_GOVERNANCE_STORE: "redis"
      SMARTCLAW_GOVERNANCE_REDIS_URL: "redis://redis:6379/0"
      SMARTCLAW_MEMORY_STORE: "postgres"
      SMARTCLAW_MEMORY_POSTGRES_DSN: "postgresql://smartclaw:${POSTGRES_PASSWORD:-smartclaw_pg_pwd}@postgres:5432/smartclaw"
      SMARTCLAW_HOME: "/root/.smartclaw"
      SMARTCLAW_RUN_DIR: "/tmp/fc-run"
      SMARTCLAW_ADMIN_TOKEN: "${SMARTCLAW_ADMIN_TOKEN:?请先设置 SMARTCLAW_ADMIN_TOKEN（多副本共享同一凭证）}"
      SMARTCLAW_REPLICA_ID: "app2"
    ports:
      - "8002:8000"

  lb:
    image: nginx:1.27-alpine
    container_name: fc-ha-lb
    restart: unless-stopped
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    volumes:
      - ./deploy/nginx/replicas_ha.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"

volumes:
  fc_state:
  pg_data:
