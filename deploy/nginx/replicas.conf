# SmartClaw 多副本负载均衡（见 docker-compose.replicas.yml / progress.md §12.3）
# 轮询把请求分摊到两个副本；用于演示「LB 后任意副本命中，控制面结果一致」。

upstream smartclaw_replicas {
    # 默认轮询：连续请求会交替落到 app1 / app2
    server app1:8000 max_fails=3 fail_timeout=5s;
    server app2:8000 max_fails=3 fail_timeout=5s;
}

server {
    listen 8080;
    server_name _;

    # 把命中的上游副本回写到响应头，便于验证脚本观察轮询是否真的分摊
    add_header X-Upstream $upstream_addr always;

    location / {
        proxy_pass http://smartclaw_replicas;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
