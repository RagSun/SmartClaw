# SmartClaw HA（完整状态一致）负载均衡 —— 会话亲和（见 progress.md §13）
#
# 与 replicas.conf（控制面最小验证，轮询）不同：本配置用 ip_hash 做「会话亲和」，
# 让同一来源客户端稳定命中同一副本。这是「共享卷 + 文件态」拓扑下的写安全前提：
#   - 不同 Agent 的文件（data/agents/{A}、MEMORY.md…）天然落在不同路径，互不冲突；
#   - 亲和保证「同一对话/同一 Agent」的 MEMORY.md / session 文件不会被两个副本同时写。
# 高频结构化记忆已走 Postgres（事务 + pg_advisory_lock 串行化），不依赖亲和。
#
# 生产建议：若前置另一层 LB，请改用基于稳定业务键的一致性哈希
# （如飞书 chat_id / open_id），而非 ip_hash（NAT 后多客户端会共用一个出口 IP）。

upstream smartclaw_ha {
    ip_hash;
    server app1:8000 max_fails=3 fail_timeout=10s;
    server app2:8000 max_fails=3 fail_timeout=10s;
}

server {
    listen 8080;
    server_name _;

    # 便于排障：响应头回显实际命中的上游副本
    add_header X-Upstream $upstream_addr always;

    location / {
        proxy_pass http://smartclaw_ha;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }
}
