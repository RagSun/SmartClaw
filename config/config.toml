[smartclaw]
name = "SmartClaw"
version = "1.0.0"
environment = "development"
agent_workspace_base = "/home/luckyu/.smartclaw/workspace"

[server]
host = "0.0.0.0"
port = 8000
workers = 1
max_request_bytes = 1048576

[sandbox]
enabled = true
backend = "docker"
warm_pool_size = 5
max_instances = 100
memory_mb = 128
cpu_count = 1
# Docker 沙箱容器内工作区挂载点（bind mount 目标与 -w 工作目录）。
# 中性路径 /workspace，root 与非 root(1000:1000) 用户均兼容；可用 SANDBOX_CONTAINER_WORKSPACE 覆盖。
container_workspace = "/workspace"

[channels.feishu]
enabled = false
app_id = ""
app_secret = ""

[channels.wecom]
enabled = false
corp_id = ""
agent_id = ""
secret = ""

[logging]
level = "INFO"
file_enabled = true
file_path = "logs/smartclaw.log"
console_enabled = true

[llm]
provider = "deepseek"
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com/v1"
api_key = ""
max_tokens = 8192
temperature = 0.7
top_p = 1.0

[vision]
enabled = false
model = ""
base_url = ""
api_key = ""
timeout = 60
max_retries = 3

[langsmith]
enabled = false
api_key = ""
project = ""
endpoint = ""

[auth]
admin_require_auth = true
admin_bearer_token = ""

[memory]
store = "sqlite"
