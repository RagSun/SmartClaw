[llm]
provider = "deepseek"
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com/v1"
api_key = ""
max_tokens = 8192
temperature = 0.7

[vision]
enabled = false
model = "qwen3.7-plus"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key = ""
timeout = 60
max_retries = 3

[channels.feishu]
app_id = ""
app_secret = ""

[sandbox]
type = "docker"
enabled = true
memory_mb = 128
cpu_count = 1

[server]
host = "0.0.0.0"
port = 8000
workers = 4

[logging]
level = "INFO"
file = "/opt/smartclaw/logs/smartclaw.log"
