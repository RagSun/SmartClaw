# SmartClaw 一键部署编排
#
# 设计原则（见 progress.md P0-2）：
#   Redis 是「硬性依赖、无回退」。治理（限流/配额/并发）与 webhook 防重放的运行时
#   状态都下沉到 Redis，从而在多 worker / 多副本下共享同一份真相，杜绝「配额被放大
#   N 倍 / 限流形同虚设 / 同一事件被各副本各放行一次」。
#
#   - smartclaw 通过 depends_on: redis(service_healthy) 保证 Redis 先就绪；
#   - 通过环境变量把治理状态后端强制设为 redis（SMARTCLAW_GOVERNANCE_STORE=redis）；
#   - 若 Redis 不可达，smartclaw 启动期 fail-fast（绝不静默降级成进程内内存）。
#
# 用法：
#   1) 把你的 config.toml（含 LLM/api_key 等）放到 ./deploy/config/config.toml
#   2) docker compose up -d --build
#   3) 健康检查： curl http://localhost:8000/api/monitoring/health
#
# 仅本机起一台 Redis 做开发/验证（不跑 app）：
#   docker compose up -d redis

services:
  redis:
    image: redis:7-alpine
    container_name: smartclaw-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  smartclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartclaw-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # —— 治理状态后端：硬性使用 Redis，无回退 ——
      SMARTCLAW_GOVERNANCE_ENABLED: "true"
      SMARTCLAW_GOVERNANCE_STORE: "redis"
      SMARTCLAW_GOVERNANCE_REDIS_URL: "redis://redis:6379/0"
      # —— 管理面凭证：经 env 注入（勿入库）。store=redis 时租户注册表自动共享同一 Redis，
      #    使「开通/停用/配额」在多副本一致。未设此 token 则管理面默认拒绝（secure by default）。——
      SMARTCLAW_ADMIN_TOKEN: "${SMARTCLAW_ADMIN_TOKEN:?请在宿主环境或 .env 设置管理面凭证后再部署}"
    ports:
      - "8000:8000"
    volumes:
      # 你的配置（LLM、api_key、租户映射、治理限额等）
      - ./deploy/config:/opt/smartclaw/config
      # 业务数据 / 记忆库 / 日志持久化
      - ./deploy/data:/opt/smartclaw/data
      - ./deploy/logs:/opt/smartclaw/logs
    command: ["smartclaw", "start", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/monitoring/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  redis-data:
